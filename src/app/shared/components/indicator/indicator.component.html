<div #indicator class="indicator">
  @for (el of elements; track el; let i = $index) {
    <div #element class="element" [ngClass]="{'active': i === active}" (activate)="signalChange(i)">
      <div class="description">{{ el }}</div>
    </div>
  }
  <div #highlight class="element-highlight"></div>
</div>
