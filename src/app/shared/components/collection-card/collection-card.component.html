
<button attr.aria-label="Navigate to {{ collection.name }} collection" class="collection-card" routerLink="{{ link }}">
  @if (pictureLocation) {
    <img
      aria-hidden="true"
      class="card__image"
      src="{{ pictureLocation }}"
      alt="{{ collection.name }} logo"
      [ngClass]="{'long': collection?.abvName === 'ncyte' || collection?.abvName === 'xpcyber' || collection?.abvName === 'deterlab' || collection?.abvName === '502_project' || collection?.abvName === 'cyberskills2work', 'small': collection?.abvName === 'clark4kids'}">
  } @else {
    <clark-generic-collection-logo></clark-generic-collection-logo>
  }
  <div aria-hidden="true" class="card__name" [ngClass]="{'long': collection?.abvName === 'deterlab' || collection?.abvName === 'cyberskills2work', 'small': collection?.abvName === 'clark4kids'}">{{ collection.name }}</div>
</button>
