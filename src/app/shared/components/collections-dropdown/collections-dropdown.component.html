<div class="fullscreen" (click)="activateClose()">
  <div class="triangle"></div>
  <div [@dropDownMenu] class="collections-dropdown" id="collectionsDropdown">
    <h1>Collections</h1>
    <div class="collection-grid">
      @if (loading) {
        <div class="loading">
          <div class="collections-loading">
            <i class="far fa-spinner-third fa-spin"></i>
            Loading Collections...
          </div>
        </div>
      }
      @for (c of collections; track c) {
        <clark-collection-card (activate)="activateClose()" class="item"
        [collection]="c"></clark-collection-card>
      }
    </div>
  </div>
</div>
