@if (chatbotState === 'closed' || chatbotState === 'minimized') {
  <clark-chatbot-launcher
    [isCookieBannerVisible]="isCookieBannerVisible"
  (chatbotOpened)="openChatbot()"></clark-chatbot-launcher>
}

@if (chatbotState === 'open') {
  <clark-chatbot-window (chatbotClosed)="closeChatbot()"
  (chatbotMinimized)="minimizeChatbot()"></clark-chatbot-window>
}
