<div class="top-downloads">
  <h2 class="title">Most Downloaded Learning Objects</h2>
  @if (!loading) {
    <div class="downloads-container">
      @for (lo of learningObjects; track lo) {
        <div>
          <div>
            <div [ngClass]="'length ' + lo.length">
              {{ lo.length | titlecase }}
            </div>
            <a class="name" [routerLink]="['/details', lo.author.username, lo.cuid, lo.version]">
              {{ lo.name }}
            </a>
            <div class="count">
              {{ lo.metrics.downloads }}
            </div>
          </div>
        </div>
      }
    </div>
  } @else {
    <div class="loading">
      <i class="far fa-spinner-third fa-spin"></i>
      <p>Loading ...</p>
    </div>
  }
</div>
