<div class="chart-wrapper">
  @if (!chart) {
    <div class="loading">
      <i class="fal fa-spinner-third fa-spin"></i>
    </div>
  }
  @if (chart) {
    <div class="chart">
      <div class="header">
        <div class="title" tabindex="0">
          {{chart?.title}}
        </div>
        @if (moreInfoLink) {
          <div class="learn-more">
            <a [href]="moreInfoLink" target="__blank" rel="noopener" attr.aria-label="Learn More about {{ chart?.title }}">Learn More</a>
          </div>
        }
      </div>
      <canvas tabindex="0" attr.aria-label="{{ ariaLabel }}" baseChart
        [data]="chart?.data"
        [options]="chart?.options"
        [type]="chart?.type"
        [legend]="chart?.legend"
        (mouseleave)="handleMouseleave()">
      </canvas>
    </div>
  }
</div>
