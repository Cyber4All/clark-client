<div class="wrapper">

  @if (width > 750) {
    <div class="topics">
      <button class="scroll-button" (activate)="horizontalScrollOnClick(false)">
        <i class="fas fa-chevron-left"></i>
      </button>
      <div #topicScroll class="topics-list">
        <div class="shadow left" aria-hidden="true"></div>
        <!-- NOTE: Add left and right buttons for scrolling if it becomes an issue -->
        @for (topic of topics; track topic) {
          <button class="topic-btn" (activate)="selectTopic(topic._id)" [ngClass]="{'selected': selectedTopic === topic._id}">{{ topic.name }}</button>
        }
        @if (topics.length === 0) {
          <span>Loading Topics...</span>
        }
        <div class="shadow right" aria-hidden="true"></div>
      </div>
      <button class="scroll-button" (activate)="horizontalScrollOnClick(true)">
        <i class="fas fa-chevron-right"></i>
      </button>
    </div>
  }

  @if (width <= 750) {
    <div>
      @if (topics.length > 0) {
        <select (change)="getObjects()" [(ngModel)]="selectedTopic">
          @for (topic of topics; track topic) {
            <option [value]="topic._id" [selected]="selectedTopic === topic._id">{{ topic.name }}</option>
          }
        </select>
      }
      @if (topics.length === 0) {
        <span>Loading Topics...</span>
      }
    </div>
  }
  @if (objects && objects.length > 0) {
    <div class="objects">
      @for (l of objects; track l) {
        <clark-learning-object-component [learningObject]="l" [loading]="loading" learningObjectCard></clark-learning-object-component>
      }
      <div class="all" [ngClass]="{'full-width': width < 1175}">
        <a (activate)="navigate()">See all <i class="fa fa-angle-right"></i></a>
      </div>
    </div>
  }
</div>
