<div class="wrapper">
  <h1>What can we help you with today?</h1>

  @if (selectedTemplate === -1) {
    <div @helpCard class="grid">
      @for (option of helpOptions; track option) {
        <clark-help-card class="card" [option]="option" (activate)="selectTemplate(option.value)"></clark-help-card>
      }
    </div>
  }

  @if (selectedTemplate === 0 || selectedTemplate === 1) {
    <clark-help-back-btn
      @helpBackButton
      [option]="helpOptions[selectedTemplate]"
      (activate)="selectTemplate(-1); handleFrameworkClicked();"
    ></clark-help-back-btn>
  }
  @if (selectedTemplate === 0) {
    <clark-teach-now @helpComponent></clark-teach-now>
  }
  @if (selectedTemplate === 1) {
    <clark-build-program @helpComponent></clark-build-program>
  }

</div>
