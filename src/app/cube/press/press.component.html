<div class="container">
  <div class="splash-container">
    <clark-press-splash (viewPressKit)="downloadPressKit()" (viewLogo)="downloadLogo()"></clark-press-splash>
  </div>
  <div class="about-container">
    <clark-press-about></clark-press-about>
  </div>
  <div class="media-feature-cards-container">
    <h1>Press Highlights</h1>
    <div class="card-container">
      @for (m of mentions.slice(0, 5); track m) {
        <clark-media-card [mention]="m"></clark-media-card>
      }
    </div>
    <h1>Recent Press</h1>
    <div class="old-news-container">
      @for (m of mentions; track m) {
        <clark-media-item [mention]="m"></clark-media-item>
      }
    </div>
  </div>
</div>
