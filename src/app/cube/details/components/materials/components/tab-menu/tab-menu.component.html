<section class='tab-menu'>
  @for (option of options; track option) {
    <div class='tab-menu__label-container'>
      <span role='button' (activate)=emitSelection(option.name) [ngClass]='{ "label-container__selected-label": currentSelection === option.name }'>
        <i aria-hidden='true' class='tab-menu__lab-container__icon {{ option.class }}'></i>
        <span class='tab-menu__label-container__label'>{{ option.name }}</span>
      </span>
    </div>
  }
</section>
