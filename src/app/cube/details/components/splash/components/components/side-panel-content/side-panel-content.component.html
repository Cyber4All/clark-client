<section class='side-panel-content'>
  <section class='side-panel-content__header-container'>
    <h2 class='side-panel-content__header-container__text'>Hierarchy</h2>
  </section>
  @if (parents.length) {
    <section class='side-panel-content__parents-container'>
      <h3 class='side-panel-content__parents-container__header-text'>Parents</h3>
      @for (parent of parents; track parent) {
        <div class='side-panel-content__parents-container__cards-container'>
          <clark-learning-object-component  [learningObject]="parent"></clark-learning-object-component>
        </div>
      }
    </section>
  }
  @if (children.length) {
    <section class='side-panel-content__children-container'>
      <h3 class='side-panel-content__children-container__header-text'>Children</h3>
      @for (child of children; track child) {
        <div class='side-panel-content__children-container__cards-container'>
          <clark-learning-object-component [learningObject]="child"></clark-learning-object-component>
        </div>
      }
    </section>
  }
</section>
