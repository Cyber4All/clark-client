@if (topics.length > 0) {
  <div class="pill-container">
    @for (item of topics; track item) {
      <div>
        <button
          [class.selected]="selectedTopics.includes(item)"
          (click)="toggleTopics(item)"
          >
          {{ item.name }}
        </button>
      </div>
    }
  </div>
}
