<div>
  <div class="header">
    <h1>
      {{ title }}
    </h1>
  </div>
  <div class = 'accordian'>
    <mat-tab-group class = 'tabs' mat-align-tabs="center" mat-stretch-tabs class="example-stretched-tabs mat-elevation-z3">
      @for (tab of tabs; track tab) {
        <mat-tab [label]="tab.title">
          @for (sec of tab.topics; track sec) {
            <mat-accordion>
              <h3>
                {{sec.title}}
              </h3>
              @for (questions of sec.questions; track questions) {
                <mat-expansion-panel>
                  <mat-expansion-panel-header>
                    <mat-panel-title>
                      {{ questions.question }}
                    </mat-panel-title>
                  </mat-expansion-panel-header>
                  <p>
                    <span [innerHtml]="questions.answer"></span>
                  </p>
                </mat-expansion-panel>
              }
            </mat-accordion>
          }
        </mat-tab>
      }
    </mat-tab-group>
  </div>
</div>
