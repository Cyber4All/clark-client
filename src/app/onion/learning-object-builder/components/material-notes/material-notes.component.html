<div class="note-wrapper">
  <div (click)="openNote()" class="note-title" [ngClass]="{ 'note-title-blue' : open }">
    @if (!open) {
      <span class="arrow">
        <i class="fa fa-chevron-down"></i>
      </span>
    }
    @if (open) {
      <span class="arrow">
        <i class="fa fa-chevron-up"></i>
      </span>
    }
    {{ note.title }}
  </div>
  @if (open) {
    <div class="note-content" [innerHTML]="note.content"></div>
  }
</div>
