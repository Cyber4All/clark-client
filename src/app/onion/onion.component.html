<clark-contextmenu [content]="modalService.contextMenuContent"></clark-contextmenu>
<clark-dialogmenu [content]="modalService.dialogMenuContent"></clark-dialogmenu>
@if (authService.status) {
  <div class="outer-wrapper">
    <div class="content">
      <div [@onionTransitions]="routeState" class="outlet sub-content">
        <router-outlet #o="outlet"></router-outlet>
      </div>
    </div>
  </div>
}
@if (!authService.user.emailVerified) {
  <clark-email-banner></clark-email-banner>
}
